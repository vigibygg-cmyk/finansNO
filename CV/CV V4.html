<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV tool V4 by Vytautas G.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600;700&family=Lato:wght@300;400;700;900&family=Roboto:wght@300;400;500;700&family=Montserrat:wght@300;400;600;700&display=swap');

        :root {
            --accent: #2c3e50;
            --main-text: #333333;
            --font-family: 'Open Sans', sans-serif;
        }

        * { box-sizing: border-box; }
        
        body { 
            background: #f0f2f5; 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Inter', sans-serif;
        }

        .no-print {
            width: 210mm;
            background: white;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 150px; }
        .control-group label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #888; }

        select, input[type="color"] {
            padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; width: 100%;
        }

        .cv-page {
            width: 210mm;
            min-height: 297mm;
            background: #ffffff;
            padding: 60px 80px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            color: var(--main-text);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
        }

        .header-section {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .name-input { 
            font-size: 36px !important; 
            font-weight: 700; 
            color: var(--accent);
            border: none;
            width: 100%;
            margin-bottom: 5px;
        }
        
        .title-input {
            font-size: 18px !important;
            font-weight: 400;
            color: #555;
            width: 100%;
        }

        .summary-box { margin-bottom: 15px; }
        .summary-text { font-size: 14px; line-height: 1.6; color: #444; resize: none; overflow: hidden; }

        .contact-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 13px;
            color: #555;
            margin-bottom: 35px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .contact-bar span { font-weight: 700; color: var(--accent); margin-right: 5px; }
        .contact-item { display: flex; align-items: center; }

        .section { margin-bottom: 25px; }
        .section-title {
            font-size: 17px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .item { margin-bottom: 20px; position: relative; }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; }
        .item-title { font-size: 15px; font-weight: 700; text-transform: uppercase; flex: 1; }
        .item-date { font-size: 13px; color: #777; width: 150px; text-align: right; }
        .item-sub { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 5px; }
        .item-desc { font-size: 13px; line-height: 1.5; color: #444; resize: none; overflow: hidden; }

        .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 40px; }

        .photo-wrap {
            float: right;
            width: 110px;
            height: 130px;
            background: #f9f9f9;
            margin-left: 20px;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }
        .photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .photo-wrap span { font-size: 8px; text-align: center; color: #bbb; padding: 5px; }

        .btn-add {
            border: 1px dashed #ccc; background: #fff; color: #aaa;
            padding: 5px; font-size: 10px; font-weight: 700; width: 100%;
            cursor: pointer; text-transform: uppercase; margin-top: 5px;
        }
        .btn-add:hover { color: var(--accent); border-color: var(--accent); }
        .btn-remove { position: absolute; left: -35px; top: 0; color: #ff7675; border: none; background: none; cursor: pointer; }

        .actions { margin-left: auto; display: flex; gap: 10px; }
        .btn-action { padding: 10px 18px; border-radius: 4px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; }
        .btn-save { background: #27ae60; color: white; }
        .btn-print { background: #2c3e50; color: white; }

        input, textarea { width: 100%; border: none; background: transparent; padding: 2px 0; font-size: inherit; color: inherit; font-family: inherit; }
        input:focus, textarea:focus { outline: none; background: rgba(0,0,0,0.02); }

        @media print {
            .no-print, .btn-add, .btn-remove { display: none !important; }
            body { padding: 0; background: white; }
            .cv-page { box-shadow: none; width: 100%; padding: 40px 60px; }
        }
    </style>
</head>
<body oninput="saveToLocal()">

<div class="no-print">
    <div class="control-group">
        <label>Kalba / Language</label>
        <select id="langSelect" onchange="changeLanguage()">
            <option value="lt">Lietuvių</option>
            <option value="en">English</option>
            <option value="no">Norsk</option>
            <option value="ru">Русский</option>
            <option value="pl">Polski</option>
        </select>
    </div>
    <div class="control-group">
        <label>Šriftas / Font</label>
        <select id="fontSelect" onchange="updateStyles()">
            <option value="'Open Sans', sans-serif">Open Sans</option>
            <option value="'Inter', sans-serif">Inter</option>
            <option value="'Lato', sans-serif">Lato</option>
            <option value="'Montserrat', sans-serif">Montserrat</option>
            <option value="'Roboto', sans-serif">Roboto</option>
        </select>
    </div>
    <div class="control-group">
        <label>Spalva / Color</label>
        <input type="color" id="accentColor" value="#2c3e50" oninput="updateStyles()">
    </div>
    <div class="actions">
        <button class="btn-action btn-save" onclick="downloadHTML()">IŠSAUGOTI HTML</button>
        <button class="btn-action btn-print" onclick="window.print()">SPAUSDINTI / PDF</button>
    </div>
</div>

<div class="cv-page" id="cv">
    <div class="photo-wrap" onclick="document.getElementById('photoInp').click()">
        <img id="photoPreview" style="display:none;">
        <span id="photoTxt">Spustelėkite nuotraukai</span>
        <input type="file" id="photoInp" hidden onchange="handlePhoto(this)">
    </div>

    <header class="header-section">
        <input type="text" class="name-input" id="cv-name" placeholder="VARDAS PAVARDĖ">
        <input type="text" class="title-input" id="cv-title" placeholder="JŪSŲ PAREIGOS">
    </header>

    <div class="summary-box">
        <textarea id="cv-about" rows="1" class="summary-text" oninput="autoHeight(this)" placeholder="Trumpas prisistatymas..."></textarea>
    </div>

    <div class="contact-bar">
        <div class="contact-item">
            <span id="lbl-phone">Tel:</span>
            <input type="text" id="cv-phone" placeholder="+370 ..." style="width:120px">
        </div>
        <div class="contact-item">
            <span id="lbl-email">El. paštas:</span>
            <input type="text" id="cv-email" placeholder="el@pastas.lt" style="width:160px">
        </div>
        <div class="contact-item">
            <span id="lbl-address">Adresas:</span>
            <input type="text" id="cv-address" placeholder="Gatvė, Miestas" style="width:200px">
        </div>
    </div>

    <div class="section">
        <div class="section-title" id="sec-experience">Darbo patirtis</div>
        <div id="exp-list"></div>
        <button class="btn-add" id="btn-add-exp" onclick="addItem('exp-list')">+ PRIDĖTI PATIRTĮ</button>
    </div>

    <div class="section">
        <div class="section-title" id="sec-skills">Įgūdžiai</div>
        <textarea id="cv-skills" rows="1" oninput="autoHeight(this)" placeholder="Įgūdis 1&#10;Įgūdis 2..."></textarea>
    </div>

    <div class="section">
        <div class="section-title" id="sec-education">Išsilavinimas</div>
        <div id="edu-list"></div>
        <button class="btn-add" id="btn-add-edu" onclick="addItem('edu-list')">+ PRIDĖTI IŠSILAVINIMĄ</button>
    </div>

    <div class="section">
        <div class="section-title" id="sec-courses">Kursai ir sertifikatai</div>
        <div id="course-list"></div>
        <button class="btn-add" id="btn-add-course" onclick="addItem('course-list')">+ PRIDĖTI KURSĄ</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
        <div class="section">
            <div class="section-title" id="sec-languages">Kalbos</div>
            <div id="lang-list"></div>
            <button class="btn-add" id="btn-add-lang" onclick="addLang()">+ PRIDĖTI KALBĄ</button>
        </div>
        <div class="section">
            <div class="section-title" id="sec-interests">Interesai</div>
            <textarea id="cv-interests" rows="1" oninput="autoHeight(this)" placeholder="Pomėgiai..."></textarea>
        </div>
    </div>
</div>

<script>
    const translations = {
        lt: {
            phone: "Tel:", phone_ph: "+370 ...", email: "El. paštas:", email_ph: "vardas@pastas.lt", 
            address: "Adresas:", addr_ph: "Gatvė, Miestas", skills: "Įgūdžiai", skills_ph: "Įgūdis 1\nĮgūdis 2...", 
            languages: "Kalbos", about: "Apie mane", about_ph: "Trumpas profesionalus prisistatymas...",
            experience: "Darbo patirtis", education: "Išsilavinimas", courses: "Kursai ir sertifikatai", 
            interests: "Interesai", interests_ph: "Pomėgiai...", pos: "Pareigos", comp: "Įmonė", date: "Data / Metai", desc: "Atsakomybės...", 
            deg: "Specialybė / Laipsnis", inst: "Mokymo įstaiga", course: "Kursas / Sertifikatas", native: "Gimtoji", 
            add_exp: "+ PRIDĖTI PATIRTĮ", add_edu: "+ PRIDĖTI IŠSILAVINIMĄ", add_course: "+ PRIDĖTI KURSĄ", add_lang: "+ PRIDĖTI KALBĄ",
            name_ph: "VARDAS PAVARDĖ", title_ph: "JŪSŲ PAREIGOS", photo_txt: "Spustelėkite nuotraukai", lang_ph: "Kalba"
        },
        en: {
            phone: "Phone:", phone_ph: "+000 ...", email: "Email:", email_ph: "name@mail.com", 
            address: "Address:", addr_ph: "Street, City", skills: "Skills", skills_ph: "Skill 1\nSkill 2...", 
            languages: "Languages", about: "Summary", about_ph: "Professional summary...",
            experience: "Experience", education: "Education", courses: "Certifications", 
            interests: "Interests", interests_ph: "Hobbies...", pos: "Position", comp: "Company", date: "Date / Years", desc: "Responsibilities...", 
            deg: "Degree / Major", inst: "Institution", course: "Course / Certificate", native: "Native", 
            add_exp: "+ ADD EXPERIENCE", add_edu: "+ ADD EDUCATION", add_course: "+ ADD CERTIFICATION", add_lang: "+ ADD LANGUAGE",
            name_ph: "FULL NAME", title_ph: "YOUR TITLE", photo_txt: "Click to upload", lang_ph: "Language"
        },
        no: {
            phone: "Tlf:", phone_ph: "+47 ...", email: "E-post:", email_ph: "navn@epost.no", 
            address: "Adresse:", addr_ph: "Gate, By", skills: "Ferdigheter", skills_ph: "Ferdighet 1...", 
            languages: "Språk", about: "Sammendrag", about_ph: "Kort presentasjon...",
            experience: "Arbeidserfaring", education: "Utdanning", courses: "Sertifiseringer", 
            interests: "Interesser", interests_ph: "Hobbyer...", pos: "Stilling", comp: "Firma", date: "Dato", desc: "Beskrivelse...", 
            deg: "Grad", inst: "Institusjon", course: "Kursnavn", native: "Morsmål", 
            add_exp: "+ LEGG TIL ERFARING", add_edu: "+ LEGG TIL UTDANNING", add_course: "+ LEGG TIL KURS", add_lang: "+ LEGG TIL SPRÅK",
            name_ph: "FULLT NAVN", title_ph: "DIN STILLING", photo_txt: "Klikk for bilde", lang_ph: "Språk"
        },
        ru: {
            phone: "Тел:", phone_ph: "+7 ...", email: "Почта:", email_ph: "имя@почта.ru", 
            address: "Адрес:", addr_ph: "Город, Улица", skills: "Навыки", skills_ph: "Навык 1...", 
            languages: "Языки", about: "О себе", about_ph: "Краткое вступление...",
            experience: "Опыт работы", education: "Образование", courses: "Курсы", 
            interests: "Интересы", interests_ph: "Хобби...", pos: "Должность", comp: "Компания", date: "Дата", desc: "Обязанности...", 
            deg: "Степень", inst: "Заведение", course: "Курс", native: "Родной", 
            add_exp: "+ ДОБАВИТЬ ОПЫТ", add_edu: "+ ДОБАВИТЬ ОБРАЗОВАНИЕ", add_course: "+ ДОБАВИТЬ КУРС", add_lang: "+ ДОБАВИТЬ ЯЗЫК",
            name_ph: "ИМЯ ФАМИЛИЯ", title_ph: "ВАША ДОЛЖНОСТЬ", photo_txt: "Загрузить фото", lang_ph: "Язык"
        },
        pl: {
            phone: "Tel:", phone_ph: "+48 ...", email: "E-mail:", email_ph: "imie@mail.pl", 
            address: "Adres:", addr_ph: "Ulica, Miasto", skills: "Umiejętności", skills_ph: "Umiejętność 1...", 
            languages: "Języki", about: "O mnie", about_ph: "Podsumowanie...",
            experience: "Doświadczenie", education: "Edukacja", courses: "Kursy", 
            interests: "Zainteresowania", interests_ph: "Hobby...", pos: "Stanowisko", comp: "Firma", date: "Data", desc: "Opis...", 
            deg: "Stopień", inst: "Uczelnia", course: "Kurs", native: "Ojczysty", 
            add_exp: "+ DODAJ DOŚWIADCZENIE", add_edu: "+ DODAJ EDUKACJĘ", add_course: "+ DODAJ KURSY", add_lang: "+ DODAJ JĘZYK",
            name_ph: "IMIĘ NAZWISKO", title_ph: "TWOJE STANOWISKO", photo_txt: "Dodaj zdjęcie", lang_ph: "Język"
        }
    };

    function updateStyles() {
        const root = document.documentElement;
        root.style.setProperty('--accent', document.getElementById('accentColor').value);
        root.style.setProperty('--font-family', document.getElementById('fontSelect').value);
        saveToLocal();
    }

    function autoHeight(el) { 
        el.style.height = 'auto'; 
        el.style.height = el.scrollHeight + 'px'; 
    }

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        const t = translations[lang] || translations.en;

        document.getElementById('sec-experience').innerText = t.experience;
        document.getElementById('sec-education').innerText = t.education;
        document.getElementById('sec-courses').innerText = t.courses;
        document.getElementById('sec-skills').innerText = t.skills;
        document.getElementById('sec-languages').innerText = t.languages;
        document.getElementById('sec-interests').innerText = t.interests;

        document.getElementById('lbl-phone').innerText = t.phone;
        document.getElementById('cv-phone').placeholder = t.phone_ph;
        document.getElementById('lbl-email').innerText = t.email;
        document.getElementById('cv-email').placeholder = t.email_ph;
        document.getElementById('lbl-address').innerText = t.address;
        document.getElementById('cv-address').placeholder = t.addr_ph;

        document.getElementById('cv-about').placeholder = t.about_ph;
        document.getElementById('cv-skills').placeholder = t.skills_ph;
        document.getElementById('cv-interests').placeholder = t.interests_ph;
        document.getElementById('cv-name').placeholder = t.name_ph;
        document.getElementById('cv-title').placeholder = t.title_ph;
        document.getElementById('photoTxt').innerText = t.photo_txt;

        document.getElementById('btn-add-exp').innerText = t.add_exp;
        document.getElementById('btn-add-edu').innerText = t.add_edu;
        document.getElementById('btn-add-course').innerText = t.add_course;
        document.getElementById('btn-add-lang').innerText = t.add_lang;

        // Atnaujinti esamų elementų placeholder'ius
        document.querySelectorAll('#exp-list .item').forEach(item => {
            item.querySelector('.item-title').placeholder = t.pos;
            item.querySelector('.item-sub').placeholder = t.comp;
            item.querySelector('.item-date').placeholder = t.date;
            item.querySelector('textarea').placeholder = t.desc;
        });
        document.querySelectorAll('#edu-list .item').forEach(item => {
            item.querySelector('.item-title').placeholder = t.deg;
            item.querySelector('.item-sub').placeholder = t.inst;
            item.querySelector('.item-date').placeholder = t.date;
        });
        document.querySelectorAll('#course-list .item').forEach(item => {
            item.querySelector('.item-title').placeholder = t.course;
            item.querySelector('.item-sub').placeholder = t.inst;
            item.querySelector('.item-date').placeholder = t.date;
        });

        saveToLocal();
    }

    function addItem(listId, data = null) {
        const container = document.getElementById(listId);
        const t = translations[document.getElementById('langSelect').value] || translations.en;
        const div = document.createElement('div');
        div.className = 'item';
        
        let ph = {};
        if(listId === 'exp-list') ph = { h: t.pos, s: t.comp, d: t.date, tx: t.desc };
        else if(listId === 'edu-list') ph = { h: t.deg, s: t.inst, d: t.date };
        else ph = { h: t.course, s: t.inst, d: t.date };

        div.innerHTML = `
            <button class="btn-remove" onclick="this.parentElement.remove(); saveToLocal();">✕</button>
            <div class="item-header">
                <input type="text" class="item-title" placeholder="${ph.h}" value="${data?.h || ''}">
                <input type="text" class="item-date" placeholder="${ph.d}" value="${data?.d || ''}">
            </div>
            <input type="text" class="item-sub" placeholder="${ph.s}" value="${data?.s || ''}">
            ${listId === 'exp-list' ? `<textarea rows="1" class="item-desc" placeholder="${ph.tx}" oninput="autoHeight(this)">${data?.desc || ''}</textarea>` : ''}
        `;
        container.appendChild(div);
        if(div.querySelector('textarea')) autoHeight(div.querySelector('textarea'));
        saveToLocal();
    }

    function addLang(data = null) {
        const t = translations[document.getElementById('langSelect').value] || translations.en;
        const div = document.createElement('div');
        div.style.display = 'flex'; div.style.gap = '5px'; div.style.marginBottom = '8px';
        div.innerHTML = `
            <input type="text" placeholder="${t.lang_ph}" style="font-size:13px; border-bottom:1px solid #eee" value="${data?.n || ''}">
            <select style="border:none; font-size:11px" onchange="saveToLocal()">
                <option value="A1" ${data?.v === 'A1' ? 'selected' : ''}>A1</option>
                <option value="A2" ${data?.v === 'A2' ? 'selected' : ''}>A2</option>
                <option value="B1" ${data?.v === 'B1' ? 'selected' : ''}>B1</option>
                <option value="B2" ${data?.v === 'B2' ? 'selected' : ''}>B2</option>
                <option value="C1" ${data?.v === 'C1' ? 'selected' : ''}>C1</option>
                <option value="C2" ${data?.v === 'C2' ? 'selected' : ''}>C2</option>
                <option value="Native" ${data?.v === 'Native' ? 'selected' : ''}>${t.native}</option>
            </select>
            <button onclick="this.parentElement.remove(); saveToLocal();" style="border:none; background:none; color:red; cursor:pointer">✕</button>
        `;
        document.getElementById('lang-list').appendChild(div);
        saveToLocal();
    }

    function handlePhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('photoPreview');
                img.src = e.target.result; img.style.display = 'block';
                document.getElementById('photoTxt').style.display = 'none';
                saveToLocal();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveToLocal() {
        const data = {
            name: document.getElementById('cv-name').value,
            title: document.getElementById('cv-title').value,
            about: document.getElementById('cv-about').value,
            phone: document.getElementById('cv-phone').value,
            email: document.getElementById('cv-email').value,
            address: document.getElementById('cv-address').value,
            skills: document.getElementById('cv-skills').value,
            interests: document.getElementById('cv-interests').value,
            photo: document.getElementById('photoPreview').src,
            lang: document.getElementById('langSelect').value,
            font: document.getElementById('fontSelect').value,
            accent: document.getElementById('accentColor').value,
            exp: Array.from(document.getElementById('exp-list').children).map(c => ({
                h: c.querySelector('.item-title').value, d: c.querySelector('.item-date').value,
                s: c.querySelector('.item-sub').value, desc: c.querySelector('textarea')?.value
            })),
            edu: Array.from(document.getElementById('edu-list').children).map(c => ({
                h: c.querySelector('.item-title').value, d: c.querySelector('.item-date').value,
                s: c.querySelector('.item-sub').value
            })),
            courses: Array.from(document.getElementById('course-list').children).map(c => ({
                h: c.querySelector('.item-title').value, d: c.querySelector('.item-date').value,
                s: c.querySelector('.item-sub').value
            })),
            langs: Array.from(document.getElementById('lang-list').children).map(c => ({
                n: c.querySelector('input').value, v: c.querySelector('select').value
            }))
        };
        localStorage.setItem('cv_v4_storage', JSON.stringify(data));
    }

    function loadFromLocal() {
        const saved = localStorage.getItem('cv_v4_storage');
        if (!saved) { addItem('exp-list'); addItem('edu-list'); return; }
        const d = JSON.parse(saved);
        document.getElementById('cv-name').value = d.name || '';
        document.getElementById('cv-title').value = d.title || '';
        document.getElementById('cv-about').value = d.about || '';
        document.getElementById('cv-phone').value = d.phone || '';
        document.getElementById('cv-email').value = d.email || '';
        document.getElementById('cv-address').value = d.address || '';
        document.getElementById('cv-skills').value = d.skills || '';
        document.getElementById('cv-interests').value = d.interests || '';
        if (d.photo && d.photo.startsWith('data:')) {
            const img = document.getElementById('photoPreview');
            img.src = d.photo; img.style.display = 'block';
            document.getElementById('photoTxt').style.display = 'none';
        }
        document.getElementById('langSelect').value = d.lang || 'lt';
        document.getElementById('fontSelect').value = d.font || "'Open Sans', sans-serif";
        document.getElementById('accentColor').value = d.accent || '#2c3e50';
        d.exp?.forEach(i => addItem('exp-list', i));
        d.edu?.forEach(i => addItem('edu-list', i));
        d.courses?.forEach(i => addItem('course-list', i));
        d.langs?.forEach(i => addLang(i));
        changeLanguage();
        updateStyles();
    }

    function downloadHTML() {
        saveToLocal();
        const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
